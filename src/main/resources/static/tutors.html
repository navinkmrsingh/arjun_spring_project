<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutoring Center - Tutors</title>
    <!-- Professional Bootstrap 5 styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="css/styles.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background-color: #000000;
            color: #F76902;
            padding: 20px 0;
            border-bottom: 5px solid #F76902;
            text-align: center;
        }

        .container {
            margin-top: 30px;
            max-width: 1200px;
        }

        .table-responsive {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .action-btns button {
            margin-right: 5px;
        }

        #toastContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1055;
        }
    </style>
</head>

<body>

    <header>
        <h1><i class="fas fa-chalkboard-teacher"></i> Tutoring Center Management</h1>
    </header>

    <div class="container">
        <!-- Toast Notifications -->
        <div id="toastContainer"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <h2>Manage Tutors</h2>
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Tutor</button>
        </div>

        <div class="table-responsive">
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name...">
                        <button class="btn btn-outline-success" onclick="searchTutors()"><i class="fas fa-search"></i>
                            Search</button>
                        <button class="btn btn-outline-secondary" onclick="loadTutors()"><i class="fas fa-sync"></i>
                            Reset</button>
                    </div>
                </div>
            </div>

            <table class="table table-hover table-striped align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Experience</th>
                        <th>Bio</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tutorsTableBody">
                    <!-- Dynamic Data loaded via fetch() -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="tutorModal" tabindex="-1" aria-labelledby="tutorModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="tutorForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="tutorModalLabel">Tutor Details</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="tutorId">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3" id="passwordWrapper">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password">
                            <small class="text-muted" id="passwordHelp">Leave blank to keep existing password.</small>
                        </div>
                        <div class="mb-3">
                            <label for="experience" class="form-label">Experience (Years)</label>
                            <input type="number" class="form-control" id="experience" required min="0">
                        </div>
                        <div class="mb-3">
                            <label for="bio" class="form-label">Bio / Subjects</label>
                            <textarea class="form-control" id="bio" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save Tutor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/tutors.js"></script>
</body>

</html>
