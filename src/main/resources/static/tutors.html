<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutoring Center - Tutors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/page-styles.css" rel="stylesheet">
</head>

<body>

    <header>
        <h1><i class="fas fa-chalkboard-teacher"></i> Tutoring Center Management</h1>
    </header>

    <div class="container">
        <!-- Toast Notifications -->
        <div id="toastContainer"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <h2>Manage Tutors</h2>
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> Add Tutor</button>
        </div>

        <div class="table-responsive">
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name...">
                        <button class="btn btn-outline-success" onclick="searchTutors()"><i class="fas fa-search"></i>
                            Search</button>
                        <button class="btn btn-outline-secondary" onclick="loadTutors()"><i class="fas fa-sync"></i>
                            Reset</button>
                    </div>
                </div>
            </div>

            <table class="table table-hover table-striped align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Experience</th>
                        <th>Bio</th>
                        <th>Courses</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tutorsTableBody">
                    <!-- Dynamic Data loaded via fetch() -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="tutorModal" tabindex="-1" aria-labelledby="tutorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form id="tutorForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="tutorModalLabel">Tutor Details</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <input type="hidden" id="tutorId">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3" id="passwordWrapper">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password">
                                    <small class="text-muted" id="passwordHelp">Leave blank to keep existing
                                        password.</small>
                                </div>
                                <div class="mb-3">
                                    <label for="experience" class="form-label">Experience (Years)</label>
                                    <input type="number" class="form-control" id="experience" required min="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="bio" class="form-label">Bio / Subjects</label>
                                    <textarea class="form-control" id="bio" rows="3"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Assigned Courses</label>
                                    <div id="courseCheckboxes" class="border rounded p-3"
                                        style="max-height: 200px; overflow-y: auto; background-color: #f8f9fa;">
                                        <!-- Courses will be loaded here -->
                                        <div class="text-muted small">Loading courses...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save Tutor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/tutors.js"></script>
</body>

</html>
