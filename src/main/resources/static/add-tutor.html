<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutoring Center - Register Tutor</title>
    <!-- Professional Bootstrap 5 styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        header {
            background-color: #000000;
            color: #F76902;
            padding: 20px 0;
            border-bottom: 5px solid #F76902;
            text-align: center;
        }
        .container {
            margin-top: 30px;
            max-width: 600px;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #toastContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1055;
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-user-plus"></i> Register as a Tutor</h1>
    </header>

    <div class="container">
        <!-- Toast Notifications -->
        <div id="toastContainer"></div>

        <div class="mb-3">
            <a href="/" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>

        <div class="form-container">
            <h3 class="mb-4">Tutor Registration Form</h3>
            <form id="addTutorForm">
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control" id="name" required placeholder="Enter your full name">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Enter a secure password">
                </div>
                <div class="mb-3">
                    <label for="experience" class="form-label fw-bold">Teaching Experience (Years)</label>
                    <input type="number" class="form-control" id="experience" required min="0" placeholder="e.g. 2">
                </div>
                <div class="mb-4">
                    <label for="bio" class="form-label fw-bold">Bio & Subjects</label>
                    <textarea class="form-control" id="bio" rows="4" placeholder="Tell us about yourself and what you teach..."></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">Submit Registration</button>
                    <button type="button" class="btn btn-outline-secondary" onclick="document.getElementById('addTutorForm').reset()">Clear Form</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/add-tutor.js"></script>
</body>
</html>
