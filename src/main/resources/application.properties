spring.application.name=Tutoring Center
server.port=8080

# MySQL DataSource Configuration - AUTO-CREATES DATABASE IF NOT EXISTS
spring.datasource.url=jdbc:mysql://localhost:3306/iste240?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=iste240
spring.datasource.password=abc1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration - AUTO-CREATES TABLES FROM @ENTITY CLASSES
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Data Initialization Configuration
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
